apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: cluster-net
  namespace: rook-ceph
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "name": "cluster-net",
      "type": "bridge",
      "bridge": "br-ext",
      "vlan": 3100,
      "ipam": {
        "type": "whereabouts",
        "range": "10.20.0.0/16",
        "exclude": [
          "10.20.0.0/24"
        ]
      }
    }
