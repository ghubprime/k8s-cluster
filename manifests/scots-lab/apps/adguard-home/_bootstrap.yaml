apiVersion: v1
kind: Namespace
metadata:
  name: adguard-home
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    io.cilium/bgp-virtual-ip: "true"
  labels:
    app.kubernetes.io/instance: adguard-home
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: adguard-home
    app.kubernetes.io/service: adguard-home-dns
    helm.sh/chart: app-template-3.2.1
  name: adguard-home-dns
  namespace: adguard-home
spec:
  externalTrafficPolicy: Local
  loadBalancerIP: 192.168.1.53
  ports:
  - name: dns-tcp
    port: 53
    protocol: TCP
    targetPort: 53
  - name: dns-udp
    port: 53
    protocol: UDP
    targetPort: 53
  selector:
    app.kubernetes.io/component: main
    app.kubernetes.io/instance: adguard-home
    app.kubernetes.io/name: adguard-home
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: adguard-home
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: adguard-home
    app.kubernetes.io/service: adguard-home-main
    helm.sh/chart: app-template-3.2.1
  name: adguard-home-main
  namespace: adguard-home
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 80
  selector:
    app.kubernetes.io/component: main
    app.kubernetes.io/instance: adguard-home
    app.kubernetes.io/name: adguard-home
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: adguard-config-pvc
  namespace: adguard-home
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: ceph-block
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: adguard-data-pvc
  namespace: adguard-home
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: ceph-block
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/component: main
    app.kubernetes.io/instance: adguard-home
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: adguard-home
    helm.sh/chart: app-template-3.2.1
  name: adguard-home
  namespace: adguard-home
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/component: main
      app.kubernetes.io/instance: adguard-home
      app.kubernetes.io/name: adguard-home
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: main
        app.kubernetes.io/instance: adguard-home
        app.kubernetes.io/name: adguard-home
    spec:
      automountServiceAccountToken: true
      containers:
      - env:
        - name: TZ
          value: America/Los_Angeles
        image: adguard/adguardhome:v0.107.46
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /login
            port: 80
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 1
        name: main
        resources:
          limits:
            memory: 512Mi
          requests:
            cpu: 50m
            memory: 128Mi
        volumeMounts:
        - mountPath: /opt/adguardhome/conf
          name: config
        - mountPath: /opt/adguardhome/work
          name: data
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      serviceAccountName: default
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: adguard-config-pvc
      - name: data
        persistentVolumeClaim:
          claimName: adguard-data-pvc
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: adguard-home
  namespace: adguard-home
spec:
  hostnames:
  - adguard.srbii.com
  parentRefs:
  - name: kgateway
    namespace: kgateway-system
  rules:
  - backendRefs:
    - name: adguard-home
      port: 80
