apiVersion: v1
kind: Namespace
metadata:
  name: onetimesecret
---
apiVersion: v1
kind: Service
metadata:
  name: onetimesecret
  namespace: onetimesecret
spec:
  ports:
  - name: http
    port: 3000
    targetPort: 3000
  selector:
    app: onetimesecret
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: onetimesecret-redis-data
  namespace: onetimesecret
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: ceph-block
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: onetimesecret
  name: onetimesecret
  namespace: onetimesecret
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onetimesecret
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: onetimesecret
    spec:
      containers:
      - env:
        - name: REDIS_URL
          value: redis://127.0.0.1:6379/0
        - name: HOST
          value: expires.srbii.com
        - name: SSL
          value: "true"
        - name: RACK_ENV
          value: production
        - name: AUTH_REQUIRED
          value: "false"
        envFrom:
        - secretRef:
            name: onetimesecret-secret
        image: onetimesecret/onetimesecret:v0.24.7
        name: onetimesecret
        ports:
        - containerPort: 3000
          name: http
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 128Mi
      - command:
        - redis-server
        - --appendonly
        - "yes"
        image: redis:7-bookworm
        name: redis
        ports:
        - containerPort: 6379
          name: redis
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts:
        - mountPath: /data
          name: redis-data
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: onetimesecret-redis-data
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: onetimesecret-secret
  namespace: onetimesecret
spec:
  encryptedData:
    SECRET: 
  template:
    metadata:
      name: onetimesecret-secret
      namespace: onetimesecret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: onetimesecret
  namespace: onetimesecret
spec:
  hostnames:
  - expires.srbii.com
  parentRefs:
  - name: kgateway-http
    namespace: kgateway-system
  rules:
  - backendRefs:
    - name: onetimesecret
      port: 3000
    matches:
    - path:
        type: PathPrefix
        value: /
