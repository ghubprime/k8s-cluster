apiVersion: v1
kind: Namespace
metadata:
  name: romm
---
apiVersion: v1
kind: Service
metadata:
  name: romm
  namespace: romm
spec:
  ports:
  - name: proxy
    port: 4180
    targetPort: 4180
  selector:
    app: romm
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: romm-library
  namespace: romm
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: ceph-block
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: romm-postgres-data
  namespace: romm
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: ceph-block
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: romm-resources
  namespace: romm
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: ceph-block
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: romm
  name: romm
  namespace: romm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: romm
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: romm
    spec:
      containers:
      - env:
        - name: DB_HOST
          value: 127.0.0.1
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: romm
        - name: ROMM_BASE_PATH
          value: /
        envFrom:
        - secretRef:
            name: romm-secret
        image: rommapp/romm:latest
        name: romm
        ports:
        - containerPort: 8080
          name: http
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 50m
            memory: 256Mi
        volumeMounts:
        - mountPath: /romm/library
          name: library
        - mountPath: /romm/resources
          name: resources
      - env:
        - name: POSTGRES_DB
          value: romm
        - name: POSTGRES_USER
          value: romm
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: DB_PASSWD
              name: romm-secret
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        image: postgres:16-bookworm
        name: postgres
        ports:
        - containerPort: 5432
          name: postgres
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 128Mi
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgres-data
      - args:
        - --provider=oidc
        - --oidc-issuer-url=https://auth.srbii.com/realms/homelab
        - --upstream=http://127.0.0.1:8080
        - --http-address=0.0.0.0:4180
        - --email-domain=*
        - --pass-user-headers=true
        - --pass-authorization-header=true
        - --cookie-secure=true
        - --redirect-url=https://roms.srbii.com/oauth2/callback
        - --cookie-domain=.srbii.com
        - --whitelist-domain=.srbii.com
        - --skip-provider-button=true
        envFrom:
        - secretRef:
            name: oauth2-proxy-secret
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
        name: oauth2-proxy
        ports:
        - containerPort: 4180
          name: proxy
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 32Mi
      volumes:
      - name: library
        persistentVolumeClaim:
          claimName: romm-library
      - name: resources
        persistentVolumeClaim:
          claimName: romm-resources
      - name: postgres-data
        persistentVolumeClaim:
          claimName: romm-postgres-data
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: oauth2-proxy-secret
  namespace: romm
spec:
  encryptedData:
    OAUTH2_PROXY_CLIENT_ID: 
    OAUTH2_PROXY_CLIENT_SECRET: 
    OAUTH2_PROXY_COOKIE_SECRET: 
  template:
    metadata:
      name: oauth2-proxy-secret
      namespace: romm
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: romm-secret
  namespace: romm
spec:
  encryptedData:
    DB_PASSWD: 
    DB_USER: 
    ROMM_AUTH_SECRET_KEY: 
  template:
    metadata:
      name: romm-secret
      namespace: romm
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: romm
  namespace: romm
spec:
  hostnames:
  - roms.srbii.com
  parentRefs:
  - name: kgateway-http
    namespace: kgateway-system
  rules:
  - backendRefs:
    - name: romm
      port: 4180
    matches:
    - path:
        type: PathPrefix
        value: /
