apiVersion: v1
kind: Namespace
metadata:
  name: outline
---
apiVersion: v1
kind: Service
metadata:
  name: outline
  namespace: outline
spec:
  ports:
  - name: http
    port: 3000
    targetPort: 3000
  selector:
    app: outline
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: outline-minio-data
  namespace: outline
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: ceph-block
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: outline-postgres-data
  namespace: outline
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: ceph-block
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: outline
  name: outline
  namespace: outline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: outline
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: outline
    spec:
      containers:
      - env:
        - name: URL
          value: https://kb.srbii.com
        - name: PORT
          value: "3000"
        - name: FORCE_HTTPS
          value: "false"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              key: DATABASE_URL
              name: outline-secret
        - name: DATABASE_CONNECTION_POOL_MIN
          value: "1"
        - name: DATABASE_CONNECTION_POOL_MAX
          value: "5"
        - name: REDIS_URL
          value: redis://127.0.0.1:6379
        - name: PGSSLMODE
          value: disable
        - name: FILE_STORAGE
          value: s3
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              key: MINIO_ROOT_USER
              name: outline-secret
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              key: MINIO_ROOT_PASSWORD
              name: outline-secret
        - name: AWS_REGION
          value: us-east-1
        - name: AWS_S3_UPLOAD_BUCKET_NAME
          value: outline-data
        - name: AWS_S3_UPLOAD_BUCKET_URL
          value: http://127.0.0.1:9000
        - name: AWS_S3_FORCE_PATH_STYLE
          value: "true"
        - name: AWS_S3_ACL
          value: private
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              key: SECRET_KEY
              name: outline-secret
        - name: UTILS_SECRET
          valueFrom:
            secretKeyRef:
              key: UTILS_SECRET
              name: outline-secret
        - name: OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              key: OIDC_CLIENT_ID
              name: outline-secret
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              key: OIDC_CLIENT_SECRET
              name: outline-secret
        - name: OIDC_AUTH_URI
          value: https://auth.srbii.com/realms/homelab/protocol/openid-connect/auth
        - name: OIDC_TOKEN_URI
          value: https://auth.srbii.com/realms/homelab/protocol/openid-connect/token
        - name: OIDC_USERINFO_URI
          value: https://auth.srbii.com/realms/homelab/protocol/openid-connect/userinfo
        - name: OIDC_LOGOUT_URI
          value: https://auth.srbii.com/realms/homelab/protocol/openid-connect/logout
        - name: OIDC_DISPLAY_NAME
          value: Keycloak
        - name: OIDC_USERNAME_CLAIM
          value: preferred_username
        - name: OIDC_SCOPES
          value: openid profile email
        image: outlinewiki/outline:latest
        name: outline
        ports:
        - containerPort: 3000
          name: http
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 50m
            memory: 256Mi
      - env:
        - name: POSTGRES_DB
          value: outline
        - name: POSTGRES_USER
          value: outline
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_PASSWORD
              name: outline-secret
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        image: postgres:16-bookworm
        name: postgres
        ports:
        - containerPort: 5432
          name: postgres
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 128Mi
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgres-data
      - command:
        - redis-server
        - --appendonly
        - "yes"
        image: redis:7-bookworm
        name: redis
        ports:
        - containerPort: 6379
          name: redis
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 10m
            memory: 64Mi
      - args:
        - server
        - /data
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              key: MINIO_ROOT_USER
              name: outline-secret
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              key: MINIO_ROOT_PASSWORD
              name: outline-secret
        image: minio/minio:latest
        name: minio
        ports:
        - containerPort: 9000
          name: s3
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 128Mi
        volumeMounts:
        - mountPath: /data
          name: minio-data
      initContainers:
      - command:
        - /bin/sh
        - -c
        - |
          # Wait for MinIO to start
          until mc alias set local http://127.0.0.1:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" 2>/dev/null; do
            echo "Waiting for MinIO..."
            sleep 2
          done
          mc mb --ignore-existing local/outline-data
          echo "Bucket created successfully"
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              key: MINIO_ROOT_USER
              name: outline-secret
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              key: MINIO_ROOT_PASSWORD
              name: outline-secret
        image: minio/mc:latest
        name: minio-init
        restartPolicy: Always
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: outline-postgres-data
      - name: minio-data
        persistentVolumeClaim:
          claimName: outline-minio-data
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: outline-secret
  namespace: outline
spec:
  encryptedData:
    DATABASE_URL: 
    MINIO_ROOT_PASSWORD: 
    MINIO_ROOT_USER: 
    OIDC_CLIENT_ID: 
    OIDC_CLIENT_SECRET: 
    POSTGRES_PASSWORD: 
    SECRET_KEY: 
    UTILS_SECRET: 
  template:
    metadata:
      name: outline-secret
      namespace: outline
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: outline
  namespace: outline
spec:
  hostnames:
  - kb.srbii.com
  parentRefs:
  - name: kgateway-http
    namespace: kgateway-system
  rules:
  - backendRefs:
    - name: outline
      port: 3000
    matches:
    - path:
        type: PathPrefix
        value: /
