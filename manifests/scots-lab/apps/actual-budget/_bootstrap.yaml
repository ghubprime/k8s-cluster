apiVersion: v1
kind: Namespace
metadata:
  name: actual-budget
---
apiVersion: v1
kind: Service
metadata:
  name: actual-budget
  namespace: actual-budget
spec:
  ports:
  - name: http
    port: 5006
    targetPort: 5006
  selector:
    app: actual-budget
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: actual-budget-data
  namespace: actual-budget
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: ceph-block
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: actual-budget
  name: actual-budget
  namespace: actual-budget
spec:
  replicas: 1
  selector:
    matchLabels:
      app: actual-budget
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: actual-budget
    spec:
      containers:
      - env:
        - name: ACTUAL_OPENID_DISCOVERY_URL
          value: https://auth.srbii.com/realms/homelab/.well-known/openid-configuration
        - name: ACTUAL_OPENID_CLIENT_ID
          valueFrom:
            secretKeyRef:
              key: OAUTH2_PROXY_CLIENT_ID
              name: oauth2-proxy-secret
        - name: ACTUAL_OPENID_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              key: OAUTH2_PROXY_CLIENT_SECRET
              name: oauth2-proxy-secret
        - name: ACTUAL_OPENID_SERVER_HOSTNAME
          value: https://budget.srbii.com
        - name: ACTUAL_LOGIN_METHOD
          value: openid
        - name: ACTUAL_USER_CREATION_MODE
          value: login
        image: actualbudget/actual-server:25.4.0
        name: actual-budget
        ports:
        - containerPort: 5006
          name: http
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 128Mi
        volumeMounts:
        - mountPath: /data
          name: data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: actual-budget-data
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: oauth2-proxy-secret
  namespace: actual-budget
spec:
  encryptedData:
    OAUTH2_PROXY_CLIENT_ID: 
    OAUTH2_PROXY_CLIENT_SECRET: 
    OAUTH2_PROXY_COOKIE_SECRET: 
  template:
    metadata:
      name: oauth2-proxy-secret
      namespace: actual-budget
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: actual-budget
  namespace: actual-budget
spec:
  hostnames:
  - budget.srbii.com
  parentRefs:
  - name: kgateway-http
    namespace: kgateway-system
  rules:
  - backendRefs:
    - name: actual-budget
      port: 5006
    matches:
    - path:
        type: PathPrefix
        value: /
