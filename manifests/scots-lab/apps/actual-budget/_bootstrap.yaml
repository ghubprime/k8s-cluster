apiVersion: v1
kind: Namespace
metadata:
  name: actual-budget
---
apiVersion: v1
kind: Service
metadata:
  name: actual-budget
  namespace: actual-budget
spec:
  ports:
  - name: proxy
    port: 4180
    targetPort: 4180
  selector:
    app: actual-budget
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: actual-budget-data
  namespace: actual-budget
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: ceph-block
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: actual-budget
  name: actual-budget
  namespace: actual-budget
spec:
  replicas: 1
  selector:
    matchLabels:
      app: actual-budget
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: actual-budget
    spec:
      containers:
      - image: actualbudget/actual-server:latest
        name: actual-budget
        ports:
        - containerPort: 5006
          name: http
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 128Mi
        volumeMounts:
        - mountPath: /data
          name: data
      - args:
        - --provider=oidc
        - --oidc-issuer-url=https://auth.srbii.com/realms/homelab
        - --upstream=http://127.0.0.1:5006
        - --http-address=0.0.0.0:4180
        - --email-domain=*
        - --pass-user-headers=true
        - --cookie-secure=true
        - --redirect-url=https://budget.srbii.com/oauth2/callback
        - --cookie-domain=.srbii.com
        - --whitelist-domain=.srbii.com
        - --skip-provider-button=true
        envFrom:
        - secretRef:
            name: oauth2-proxy-secret
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
        name: oauth2-proxy
        ports:
        - containerPort: 4180
          name: proxy
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 32Mi
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: actual-budget-data
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: oauth2-proxy-secret
  namespace: actual-budget
spec:
  encryptedData:
    OAUTH2_PROXY_CLIENT_ID: 
    OAUTH2_PROXY_CLIENT_SECRET: 
    OAUTH2_PROXY_COOKIE_SECRET: 
  template:
    metadata:
      name: oauth2-proxy-secret
      namespace: actual-budget
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: actual-budget
  namespace: actual-budget
spec:
  hostnames:
  - budget.srbii.com
  parentRefs:
  - name: kgateway-http
    namespace: kgateway-system
  rules:
  - backendRefs:
    - name: actual-budget
      port: 4180
    matches:
    - path:
        type: PathPrefix
        value: /
