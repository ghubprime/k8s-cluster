apiVersion: v1
kind: Namespace
metadata:
  name: homebox
---
apiVersion: v1
kind: Service
metadata:
  name: homebox
  namespace: homebox
spec:
  ports:
  - name: http
    port: 7745
    protocol: TCP
    targetPort: 7745
  selector:
    app: homebox
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: homebox-data
  namespace: homebox
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: homebox
  name: homebox
  namespace: homebox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homebox
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: homebox
    spec:
      containers:
      - env:
        - name: HBOX_OIDC_ENABLED
          value: "true"
        - name: HBOX_OIDC_ISSUER_URL
          value: https://auth.srbii.com/realms/homelab
        - name: HBOX_OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              key: HBOX_OIDC_CLIENT_ID
              name: homebox-oauth-secret
        - name: HBOX_OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              key: HBOX_OIDC_CLIENT_SECRET
              name: homebox-oauth-secret
        - name: HBOX_OPTIONS_TRUST_PROXY
          value: "true"
        image: ghcr.io/sysadminsmedia/homebox:latest
        name: homebox
        ports:
        - containerPort: 7745
          name: http
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 128Mi
        volumeMounts:
        - mountPath: /data
          name: data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: homebox-data
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: homebox-oauth-secret
  namespace: homebox
spec:
  encryptedData:
    HBOX_OIDC_CLIENT_ID: 
    HBOX_OIDC_CLIENT_SECRET: 
  template:
    metadata:
      name: homebox-oauth-secret
      namespace: homebox
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homebox
  namespace: homebox
spec:
  hostnames:
  - inventory.srbii.com
  parentRefs:
  - name: kgateway-http
    namespace: kgateway-system
  rules:
  - backendRefs:
    - name: homebox
      port: 7745
    matches:
    - path:
        type: PathPrefix
        value: /
