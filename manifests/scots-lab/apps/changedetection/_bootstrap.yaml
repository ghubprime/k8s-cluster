apiVersion: v1
kind: Namespace
metadata:
  name: changedetection
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: changedetection-app
  name: changedetection-app
  namespace: changedetection
spec:
  ports:
  - name: http
    port: 4180
    protocol: TCP
    targetPort: 4180
  selector:
    app: changedetection-app
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: changedetection
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: changedetection-io
    app.kubernetes.io/service: changedetection-changedetection-io
    app.kubernetes.io/version: latest
    helm.sh/chart: changedetection-io-0.12.0
  name: changedetection-changedetection-io
  namespace: changedetection
spec:
  ports:
  - name: http
    port: 5000
    protocol: TCP
    targetPort: http
  selector:
    app.kubernetes.io/instance: changedetection
    app.kubernetes.io/name: changedetection-io
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  annotations:
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/instance: changedetection
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: changedetection-io
    app.kubernetes.io/version: latest
    helm.sh/chart: changedetection-io-0.12.0
  name: changedetection-changedetection-io-data
  namespace: changedetection
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: ceph-block
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: changedetection
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: changedetection-io
    app.kubernetes.io/version: latest
    helm.sh/chart: changedetection-io-0.12.0
  name: changedetection-changedetection-io
  namespace: changedetection
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/instance: changedetection
      app.kubernetes.io/name: changedetection-io
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: changedetection-app
        app.kubernetes.io/instance: changedetection
        app.kubernetes.io/name: changedetection-io
    spec:
      automountServiceAccountToken: true
      containers:
      - args:
        - --provider=oidc
        - --oidc-issuer-url=https://auth.srbii.com/realms/homelab
        - --upstream=http://127.0.0.1:5000
        - --http-address=0.0.0.0:4180
        - --email-domain=*
        - --pass-user-headers=true
        - --cookie-secure=true
        - --cookie-name=_oauth2_changes
        - --redirect-url=https://changes.srbii.com/oauth2/callback
        - --cookie-domain=.srbii.com
        - --whitelist-domain=.srbii.com
        - --skip-provider-button=true
        envFrom:
        - secretRef:
            name: oauth2-proxy-secret
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
        name: oauth2-proxy
        ports:
        - containerPort: 4180
          name: proxy
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 32Mi
      - env:
        - name: BASE_URL
          value: https://changes.srbii.com
        - name: PLAYWRIGHT_DRIVER_URL
          value: ws://localhost:3000/?stealth=1&--disable-web-security=true
        - name: TZ
          value: UTC
        image: ghcr.io/dgtlmoon/changedetection.io:0.45.17
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          initialDelaySeconds: 0
          periodSeconds: 10
          tcpSocket:
            port: 5000
          timeoutSeconds: 1
        name: changedetection-changedetection-io
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          initialDelaySeconds: 0
          periodSeconds: 10
          tcpSocket:
            port: 5000
          timeoutSeconds: 1
        resources:
          limits:
            cpu: 300m
            memory: 512Mi
          requests:
            cpu: 50m
            memory: 128Mi
        startupProbe:
          failureThreshold: 30
          initialDelaySeconds: 0
          periodSeconds: 5
          tcpSocket:
            port: 5000
          timeoutSeconds: 1
        volumeMounts:
        - mountPath: /datastore
          name: data
      - env:
        - name: CONNECTION_TIMEOUT
          value: "300000"
        - name: DEFAULT_BLOCK_ADS
          value: "true"
        - name: DEFAULT_STEALTH
          value: "true"
        - name: ENABLE_DEBUGGER
          value: "false"
        - name: MAX_CONCURRENT_SESSIONS
          value: "2"
        image: browserless/chrome:latest
        name: browserless
        ports:
        - containerPort: 3000
          name: browserless
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      serviceAccountName: default
      terminationGracePeriodSeconds: 0
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: changedetection-changedetection-io-data
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: oauth2-proxy-secret
  namespace: changedetection
spec:
  encryptedData:
    OAUTH2_PROXY_CLIENT_ID: 
    OAUTH2_PROXY_CLIENT_SECRET: 
    OAUTH2_PROXY_COOKIE_SECRET: 
  template:
    metadata:
      name: oauth2-proxy-secret
      namespace: changedetection
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: changedetection
  namespace: changedetection
spec:
  hostnames:
  - changes.srbii.com
  parentRefs:
  - name: kgateway-http
    namespace: kgateway-system
  rules:
  - backendRefs:
    - name: changedetection-app
      port: 4180
    matches:
    - path:
        type: PathPrefix
        value: /
