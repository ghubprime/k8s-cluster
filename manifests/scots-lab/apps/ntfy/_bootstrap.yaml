apiVersion: v1
kind: Namespace
metadata:
  name: ntfy
---
apiVersion: v1
data:
  server.yml: |
    base-url: "https://ntfy-omni.proxy-us.srbii.com"
    upstream-base-url: "https://ntfy.sh"
    cache-file: "/var/lib/ntfy/cache.db"
    attachment-cache-dir: "/var/lib/ntfy/attachments"
    behind-proxy: true
kind: ConfigMap
metadata:
  name: ntfy-config
  namespace: ntfy
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    omni-kube-service-exposer.sidero.dev/label: Ntfy
    omni-kube-service-exposer.sidero.dev/port: "50088"
    omni-kube-service-exposer.sidero.dev/prefix: ntfy
  name: ntfy
  namespace: ntfy
spec:
  ports:
  - name: http
    port: 80
    targetPort: 80
  selector:
    app: ntfy
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ntfy-data
  namespace: ntfy
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: ceph-block
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ntfy
  name: ntfy
  namespace: ntfy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ntfy
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ntfy
    spec:
      containers:
      - args:
        - serve
        image: binwiederhier/ntfy:v2.11.0
        name: ntfy
        ports:
        - containerPort: 80
          name: http
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts:
        - mountPath: /var/lib/ntfy
          name: ntfy-data
        - mountPath: /etc/ntfy/server.yml
          name: ntfy-config
          subPath: server.yml
      volumes:
      - name: ntfy-data
        persistentVolumeClaim:
          claimName: ntfy-data
      - configMap:
          name: ntfy-config
        name: ntfy-config
