apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  name: omni-scots-lab
  namespace: argocd
spec:
  destination:
    namespace: omni-system
    server: https://kubernetes.default.svc
  project: default
  source:
    directory:
      include: '{manifests/*}'
      recurse: true
    path: .
    repoURL: https://github.com/ghubprime/omni-infra.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      allowEmpty: false
      prune: true
      selfHeal: true
