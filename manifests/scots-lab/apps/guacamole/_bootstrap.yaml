apiVersion: v1
kind: Namespace
metadata:
  name: guacamole
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: guacamole
  name: guacamole
  namespace: guacamole
spec:
  ports:
  - name: http
    port: 8080
    protocol: TCP
    targetPort: http
  selector:
    app.kubernetes.io/name: guacamole
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: guacamole-postgresql
  namespace: guacamole
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgresql
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: guacd
  name: guacd
  namespace: guacamole
spec:
  ports:
  - name: guacd
    port: 4822
    protocol: TCP
    targetPort: guacd
  selector:
    app.kubernetes.io/name: guacd
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: guacamole-db-pvc
  namespace: guacamole
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: guacamole
  name: guacamole
  namespace: guacamole
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: guacamole
  template:
    metadata:
      labels:
        app.kubernetes.io/name: guacamole
    spec:
      containers:
      - env:
        - name: GUACD_HOSTNAME
          value: guacd
        - name: GUACD_PORT
          value: "4822"
        - name: WEBAPP_CONTEXT
          value: ROOT
        - name: POSTGRES_HOSTNAME
          value: guacamole-postgresql
        - name: POSTGRES_DATABASE
          value: guacamole
        - name: POSTGRES_USER
          value: guacamole
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_PASSWORD
              name: guacamole-db-secret
        - name: OPENID_AUTHORIZATION_ENDPOINT
          value: https://auth.srbii.com/realms/homelab/protocol/openid-connect/auth
        - name: OPENID_JWKS_ENDPOINT
          value: http://localhost:8081/realms/homelab/protocol/openid-connect/certs
        - name: OPENID_ISSUER
          value: https://auth.srbii.com/realms/homelab
        - name: OPENID_CLIENT_ID
          value: guacamole-client
        - name: OPENID_REDIRECT_URI
          value: https://guacamole.srbii.com
        - name: OPENID_MAX_TOKEN_VALIDITY
          value: "1209600"
        - name: OPENID_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              key: OIDC_CLIENT_SECRET
              name: guacamole-oidc-secret
              optional: false
        image: guacamole/guacamole:1.5.5
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        name: guacamole
        ports:
        - containerPort: 8080
          name: http
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 512Mi
      - command:
        - /bin/sh
        - -c
        - |
          cat << 'EOF' > /etc/nginx/nginx.conf
          events {}
          http {
            server {
              listen 8081;
              location / {
                proxy_pass https://auth.srbii.com;
                proxy_set_header Host auth.srbii.com;
                proxy_set_header User-Agent 'curl/7.88.1';
                proxy_ssl_server_name on;
                proxy_ssl_name auth.srbii.com;
              }
            }
          }
          EOF
          nginx -g 'daemon off;'
        image: nginx:alpine
        name: user-agent-spoofer
        resources:
          limits:
            cpu: 50m
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 32Mi
      initContainers:
      - command:
        - sh
        - -c
        - until pg_isready -h guacamole-postgresql -p 5432 -U guacamole; do echo waiting
          for db; sleep 2; done;
        image: postgres:16-alpine
        name: wait-for-db
      - args:
        - |
          if [ ! -f /initdb-dir/initdb.sql ]; then
            echo "Generating schema..."
            /opt/guacamole/bin/initdb.sh --postgresql > /initdb-dir/initdb.sql || exit 1;
          fi
        command:
        - sh
        - -c
        image: guacamole/guacamole:1.5.5
        name: generate-schema
        volumeMounts:
        - mountPath: /initdb-dir
          name: initdb-vol
      - args:
        - |
          export PGPASSWORD=$POSTGRES_PASSWORD
          if ! psql -h $POSTGRES_HOSTNAME -U $POSTGRES_USER -d $POSTGRES_DATABASE -c '\dt' | grep -q 'guacamole_user'; then
            echo "Database empty. Initializing..."
            cat /initdb-dir/initdb.sql | psql -h $POSTGRES_HOSTNAME -U $POSTGRES_USER -d $POSTGRES_DATABASE
          else
            echo "Database already initialized."
          fi
        command:
        - sh
        - -c
        env:
        - name: POSTGRES_HOSTNAME
          value: guacamole-postgresql
        - name: POSTGRES_DATABASE
          value: guacamole
        - name: POSTGRES_USER
          value: guacamole
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_PASSWORD
              name: guacamole-db-secret
        image: postgres:16-alpine
        name: apply-schema
        volumeMounts:
        - mountPath: /initdb-dir
          name: initdb-vol
      volumes:
      - emptyDir: {}
        name: initdb-vol
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: guacamole-postgresql
  namespace: guacamole
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
      - env:
        - name: POSTGRES_USER
          value: guacamole
        - name: POSTGRES_DB
          value: guacamole
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_PASSWORD
              name: guacamole-db-secret
        image: postgres:16-alpine
        name: postgresql
        ports:
        - containerPort: 5432
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: pgdata
      volumes:
      - name: pgdata
        persistentVolumeClaim:
          claimName: guacamole-db-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: guacd
  name: guacd
  namespace: guacamole
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: guacd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: guacd
    spec:
      containers:
      - image: guacamole/guacd:1.5.5
        imagePullPolicy: IfNotPresent
        name: guacd
        ports:
        - containerPort: 4822
          name: guacd
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 50m
            memory: 128Mi
        securityContext:
          runAsNonRoot: false
          runAsUser: 1000
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: guacamole-db-secret
  namespace: guacamole
spec:
  encryptedData:
    POSTGRES_PASSWORD: 
  template:
    metadata:
      name: guacamole-db-secret
      namespace: guacamole
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: guacamole-oidc-secret
  namespace: guacamole
spec:
  encryptedData:
    OIDC_CLIENT_SECRET: 
  template:
    metadata:
      name: guacamole-oidc-secret
      namespace: guacamole
    type: Opaque
