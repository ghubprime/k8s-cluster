apiVersion: v1
kind: Namespace
metadata:
  name: linkwarden
---
apiVersion: v1
kind: Service
metadata:
  name: linkwarden
  namespace: linkwarden
spec:
  ports:
  - name: http
    port: 3000
    targetPort: 3000
  selector:
    app: linkwarden
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: linkwarden-data
  namespace: linkwarden
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: ceph-block
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: linkwarden-postgres-data
  namespace: linkwarden
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: ceph-block
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: linkwarden
  name: linkwarden
  namespace: linkwarden
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linkwarden
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: linkwarden
    spec:
      containers:
      - env:
        - name: NEXTAUTH_URL
          value: https://links.srbii.com/api/v1/auth
        - name: NEXT_PUBLIC_DISABLE_REGISTRATION
          value: "true"
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              key: NEXTAUTH_SECRET
              name: linkwarden-secret
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              key: DATABASE_URL
              name: linkwarden-secret
        - name: NEXT_PUBLIC_KEYCLOAK_ENABLED
          value: "true"
        - name: KEYCLOAK_ISSUER
          value: https://auth.srbii.com/realms/homelab
        - name: KEYCLOAK_CLIENT_ID
          valueFrom:
            secretKeyRef:
              key: KEYCLOAK_CLIENT_ID
              name: linkwarden-secret
        - name: KEYCLOAK_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              key: KEYCLOAK_CLIENT_SECRET
              name: linkwarden-secret
        image: ghcr.io/linkwarden/linkwarden:v2.9.3
        name: linkwarden
        ports:
        - containerPort: 3000
          name: http
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 50m
            memory: 256Mi
        volumeMounts:
        - mountPath: /data/data
          name: data
      - env:
        - name: POSTGRES_DB
          value: linkwarden
        - name: POSTGRES_USER
          value: linkwarden
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_PASSWORD
              name: linkwarden-secret
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        image: postgres:16-bookworm
        name: postgres
        ports:
        - containerPort: 5432
          name: postgres
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 128Mi
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgres-data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: linkwarden-data
      - name: postgres-data
        persistentVolumeClaim:
          claimName: linkwarden-postgres-data
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: linkwarden-secret
  namespace: linkwarden
spec:
  encryptedData:
    DATABASE_URL: 
    KEYCLOAK_CLIENT_ID: 
    KEYCLOAK_CLIENT_SECRET: 
    NEXTAUTH_SECRET: 
    POSTGRES_PASSWORD: 
  template:
    metadata:
      name: linkwarden-secret
      namespace: linkwarden
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: linkwarden
  namespace: linkwarden
spec:
  hostnames:
  - links.srbii.com
  parentRefs:
  - name: kgateway-http
    namespace: kgateway-system
  rules:
  - backendRefs:
    - name: linkwarden
      port: 3000
    matches:
    - path:
        type: PathPrefix
        value: /
