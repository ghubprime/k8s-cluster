apiVersion: v1
kind: Namespace
metadata:
  name: znuny
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: znuny-app
  name: znuny-app
  namespace: znuny
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 80
  selector:
    app: znuny-app
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: znuny-mariadb
  name: znuny-mariadb
  namespace: znuny
spec:
  ports:
  - name: mysql
    port: 3306
    protocol: TCP
    targetPort: 3306
  selector:
    app: znuny-mariadb
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app: znuny-app
  name: znuny-config
  namespace: znuny
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: ceph-block
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app: znuny-app
  name: znuny-custom
  namespace: znuny
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: ceph-block
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app: znuny-app
  name: znuny-var
  namespace: znuny
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: ceph-block
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: znuny-app
  name: znuny-app
  namespace: znuny
spec:
  replicas: 1
  selector:
    matchLabels:
      app: znuny-app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: znuny-app
    spec:
      containers:
      - env:
        - name: TZ
          value: UTC
        - name: LANG
          value: en_US.UTF-8
        - name: LANGUAGE
          value: en_US:en
        - name: LC_ALL
          value: en_US.UTF-8
        image: ghcr.io/erik-donath/znuny-docker:latest
        livenessProbe:
          failureThreshold: 5
          httpGet:
            path: /znuny/index.pl
            port: 80
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
        name: znuny
        ports:
        - containerPort: 80
          name: http
        readinessProbe:
          failureThreshold: 6
          httpGet:
            path: /znuny/index.pl
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 10
        resources:
          limits:
            cpu: 1000m
            memory: 2Gi
          requests:
            cpu: 250m
            memory: 512Mi
        securityContext:
          runAsNonRoot: false
          runAsUser: 0
        volumeMounts:
        - mountPath: /opt/znuny/var
          name: znuny-var
        - mountPath: /opt/znuny/Kernel/Config
          name: znuny-config
        - mountPath: /opt/znuny/Custom
          name: znuny-custom
      initContainers:
      - command:
        - sh
        - -c
        - |
          echo "Waiting for MariaDB to be ready..."
          until nc -z znuny-mariadb 3306; do
            echo "MariaDB not ready yet, retrying in 3s..."
            sleep 3
          done
          echo "MariaDB is ready!"
        image: busybox:1.36
        name: wait-for-db
        resources:
          limits:
            cpu: 50m
            memory: 32Mi
          requests:
            cpu: 10m
            memory: 16Mi
      volumes:
      - name: znuny-var
        persistentVolumeClaim:
          claimName: znuny-var
      - name: znuny-config
        persistentVolumeClaim:
          claimName: znuny-config
      - name: znuny-custom
        persistentVolumeClaim:
          claimName: znuny-custom
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: znuny-mariadb
  name: znuny-mariadb
  namespace: znuny
spec:
  replicas: 1
  selector:
    matchLabels:
      app: znuny-mariadb
  serviceName: znuny-mariadb
  template:
    metadata:
      labels:
        app: znuny-mariadb
    spec:
      containers:
      - args:
        - --max_allowed_packet=128M
        - --innodb_log_file_size=256M
        - --character-set-server=utf8mb4
        - --collation-server=utf8mb4_unicode_ci
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              key: MYSQL_ROOT_PASSWORD
              name: znuny-db-secret
        - name: MYSQL_DATABASE
          value: znuny
        - name: MYSQL_USER
          value: znuny
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              key: MYSQL_PASSWORD
              name: znuny-db-secret
        - name: TZ
          value: UTC
        image: mariadb:10.11
        livenessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
        name: mariadb
        ports:
        - containerPort: 3306
          name: mysql
        readinessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi
        volumeMounts:
        - mountPath: /var/lib/mysql
          name: db-data
  volumeClaimTemplates:
  - metadata:
      name: db-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
      storageClassName: ceph-block
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: znuny-db-secret
  namespace: znuny
spec:
  encryptedData:
    MYSQL_PASSWORD: 
    MYSQL_ROOT_PASSWORD: 
  template:
    metadata:
      name: znuny-db-secret
      namespace: znuny
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: znuny
  namespace: znuny
spec:
  hostnames:
  - tickets.srbii.com
  parentRefs:
  - name: kgateway-http
    namespace: kgateway-system
  rules:
  - backendRefs:
    - name: znuny-app
      port: 80
    matches:
    - path:
        type: PathPrefix
        value: /
