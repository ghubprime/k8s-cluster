apiVersion: v1
kind: Namespace
metadata:
  name: znuny
---
apiVersion: v1
data:
  oidc-header.conf: |
    # Map X-Forwarded-Email from oauth2-proxy into REMOTE_USER for Znuny HTTPBasicAuth
    SetEnvIf X-Forwarded-Email "(.*)" REMOTE_USER=$1
kind: ConfigMap
metadata:
  name: apache-oidc-config
  namespace: znuny
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: znuny-app
  name: znuny-app
  namespace: znuny
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 4180
  selector:
    app: znuny-app
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: znuny-mariadb
  name: znuny-mariadb
  namespace: znuny
spec:
  ports:
  - name: mysql
    port: 3306
    protocol: TCP
    targetPort: 3306
  selector:
    app: znuny-mariadb
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: znuny-app
  name: znuny-app
  namespace: znuny
spec:
  replicas: 1
  selector:
    matchLabels:
      app: znuny-app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: znuny-app
    spec:
      containers:
      - args:
        - --provider=oidc
        - --client-id=$(OAUTH2_PROXY_CLIENT_ID)
        - --client-secret=$(OAUTH2_PROXY_CLIENT_SECRET)
        - --cookie-secret=$(OAUTH2_PROXY_COOKIE_SECRET)
        - --oidc-issuer-url=https://auth.srbii.com/realms/homelab
        - --upstream=http://127.0.0.1:80
        - --http-address=0.0.0.0:4180
        - --email-domain=*
        - --pass-user-headers=true
        - --pass-authorization-header=true
        - --cookie-secure=true
        envFrom:
        - secretRef:
            name: oauth2-proxy-secret
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
        name: oauth2-proxy
        ports:
        - containerPort: 4180
          name: proxy
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 32Mi
      - env:
        - name: TZ
          value: UTC
        - name: ZNUNY_DB_TYPE
          value: mysql
        - name: ZNUNY_DB_HOST
          value: znuny-mariadb
        - name: ZNUNY_DB_NAME
          value: znuny
        - name: ZNUNY_DB_USER
          value: znuny
        - name: ZNUNY_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: MYSQL_PASSWORD
              name: znuny-db-secret
        - name: ZNUNY_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              key: ZNUNY_ROOT_PASSWORD
              name: znuny-db-secret
        - name: ZNUNY_FQDN
          value: tickets.srbii.com
        - name: ZNUNY_AUTO_INSTALL
          value: "true"
        - name: ZNUNY_ORGANIZATION
          value: Scots Lab
        image: docker.io/andreynsafonov/znuny:7.2.3
        livenessProbe:
          failureThreshold: 5
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 600
          periodSeconds: 30
          timeoutSeconds: 10
        name: znuny
        ports:
        - containerPort: 80
          name: http
        readinessProbe:
          failureThreshold: 8
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 10
        resources:
          limits:
            cpu: 1000m
            memory: 2Gi
          requests:
            cpu: 250m
            memory: 512Mi
        securityContext:
          runAsNonRoot: false
          runAsUser: 0
        volumeMounts:
        - mountPath: /etc/apache2/conf-enabled/oidc-header.conf
          name: apache-oidc-config
          subPath: oidc-header.conf
      initContainers:
      - command:
        - sh
        - -c
        - |
          echo "Waiting for MariaDB to be ready..."
          until nc -z znuny-mariadb 3306; do
            echo "MariaDB not ready yet, retrying in 3s..."
            sleep 3
          done
          echo "MariaDB is ready!"
        image: busybox:1.36
        name: wait-for-db
        resources:
          limits:
            cpu: 50m
            memory: 32Mi
          requests:
            cpu: 10m
            memory: 16Mi
      volumes:
      - configMap:
          defaultMode: 420
          name: apache-oidc-config
        name: apache-oidc-config
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: znuny-mariadb
  name: znuny-mariadb
  namespace: znuny
spec:
  replicas: 1
  selector:
    matchLabels:
      app: znuny-mariadb
  serviceName: znuny-mariadb
  template:
    metadata:
      labels:
        app: znuny-mariadb
    spec:
      containers:
      - args:
        - --max_allowed_packet=128M
        - --innodb_log_file_size=256M
        - --character-set-server=utf8mb4
        - --collation-server=utf8mb4_unicode_ci
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              key: MYSQL_ROOT_PASSWORD
              name: znuny-db-secret
        - name: MYSQL_DATABASE
          value: znuny
        - name: MYSQL_USER
          value: znuny
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              key: MYSQL_PASSWORD
              name: znuny-db-secret
        - name: TZ
          value: UTC
        image: mariadb:10.11
        livenessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
        name: mariadb
        ports:
        - containerPort: 3306
          name: mysql
        readinessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi
        volumeMounts:
        - mountPath: /var/lib/mysql
          name: db-data
  volumeClaimTemplates:
  - metadata:
      name: db-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
      storageClassName: ceph-block
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: oauth2-proxy-secret
  namespace: znuny
spec:
  encryptedData:
    OAUTH2_PROXY_CLIENT_ID: 
    OAUTH2_PROXY_CLIENT_SECRET: 
    OAUTH2_PROXY_COOKIE_SECRET: 
  template:
    metadata:
      name: oauth2-proxy-secret
      namespace: znuny
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: znuny-db-secret
  namespace: znuny
spec:
  encryptedData:
    MYSQL_PASSWORD: 
    MYSQL_ROOT_PASSWORD: 
    ZNUNY_ROOT_PASSWORD: 
  template:
    metadata:
      name: znuny-db-secret
      namespace: znuny
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: znuny
  namespace: znuny
spec:
  hostnames:
  - tickets.srbii.com
  parentRefs:
  - name: kgateway-http
    namespace: kgateway-system
  rules:
  - backendRefs:
    - name: znuny-app
      port: 80
    matches:
    - path:
        type: PathPrefix
        value: /
