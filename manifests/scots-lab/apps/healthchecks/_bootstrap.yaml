apiVersion: v1
kind: Namespace
metadata:
  name: healthchecks
---
apiVersion: v1
kind: Service
metadata:
  name: healthchecks
  namespace: healthchecks
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: proxy
  selector:
    app: healthchecks
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: healthchecks-data
  namespace: healthchecks
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: healthchecks
  name: healthchecks
  namespace: healthchecks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healthchecks
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: healthchecks
    spec:
      containers:
      - env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: Etc/UTC
        - name: SITE_ROOT
          value: https://ping.srbii.com
        - name: SITE_NAME
          value: Scots Lab Healthchecks
        image: lscr.io/linuxserver/healthchecks:latest
        name: healthchecks
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 128Mi
        securityContext:
          runAsNonRoot: false
          runAsUser: 0
        volumeMounts:
        - mountPath: /config
          name: data
      - args:
        - --provider=oidc
        - --provider-display-name=Keycloak
        - --oidc-issuer-url=https://auth.srbii.com/realms/homelab
        - --cookie-domain=.srbii.com
        - --email-domain=*
        - --upstream=http://127.0.0.1:8000
        - --http-address=0.0.0.0:4180
        - --skip-auth-route=^/ping/.*
        - --pass-user-headers=true
        envFrom:
        - secretRef:
            name: healthchecks-oauth2-proxy-secret
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
        name: oauth2-proxy
        ports:
        - containerPort: 4180
          name: proxy
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: healthchecks-data
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: healthchecks-oauth2-proxy-secret
  namespace: healthchecks
spec:
  encryptedData:
    OAUTH2_PROXY_CLIENT_ID: 
    OAUTH2_PROXY_CLIENT_SECRET: 
    OAUTH2_PROXY_COOKIE_SECRET: 
  template:
    metadata:
      name: healthchecks-oauth2-proxy-secret
      namespace: healthchecks
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: healthchecks
  namespace: healthchecks
spec:
  hostnames:
  - ping.srbii.com
  parentRefs:
  - name: kgateway-http
    namespace: kgateway-system
  rules:
  - backendRefs:
    - name: healthchecks
      port: 80
    filters:
    - requestHeaderModifier:
        set:
        - name: X-Forwarded-Proto
          value: https
      type: RequestHeaderModifier
    matches:
    - path:
        type: PathPrefix
        value: /
