apiVersion: v1
kind: Namespace
metadata:
  name: stirling-pdf
---
apiVersion: v1
kind: Service
metadata:
  name: stirling-pdf
  namespace: stirling-pdf
spec:
  ports:
  - name: proxy
    port: 4180
    targetPort: 4180
  selector:
    app: stirling-pdf
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: stirling-pdf
  name: stirling-pdf
  namespace: stirling-pdf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stirling-pdf
  template:
    metadata:
      labels:
        app: stirling-pdf
    spec:
      containers:
      - env:
        - name: DOCKER_ENABLE_SECURITY
          value: "false"
        image: frooodle/s-pdf:latest
        name: stirling-pdf
        ports:
        - containerPort: 8080
          name: http
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: 50m
            memory: 256Mi
      - args:
        - --provider=oidc
        - --oidc-issuer-url=https://auth.srbii.com/realms/homelab
        - --upstream=http://127.0.0.1:8080
        - --http-address=0.0.0.0:4180
        - --email-domain=*
        - --pass-user-headers=true
        - --pass-authorization-header=true
        - --cookie-secure=true
        - --redirect-url=https://pdf.srbii.com/oauth2/callback
        - --cookie-domain=.srbii.com
        - --whitelist-domain=.srbii.com
        - --skip-provider-button=true
        envFrom:
        - secretRef:
            name: oauth2-proxy-secret
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
        name: oauth2-proxy
        ports:
        - containerPort: 4180
          name: proxy
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 32Mi
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: oauth2-proxy-secret
  namespace: stirling-pdf
spec:
  encryptedData:
    OAUTH2_PROXY_CLIENT_ID: 
    OAUTH2_PROXY_CLIENT_SECRET: 
    OAUTH2_PROXY_COOKIE_SECRET: 
  template:
    metadata:
      name: oauth2-proxy-secret
      namespace: stirling-pdf
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: stirling-pdf
  namespace: stirling-pdf
spec:
  hostnames:
  - pdf.srbii.com
  parentRefs:
  - name: kgateway-http
    namespace: kgateway-system
  rules:
  - backendRefs:
    - name: stirling-pdf
      port: 4180
    matches:
    - path:
        type: PathPrefix
        value: /
