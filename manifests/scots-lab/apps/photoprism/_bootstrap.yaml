apiVersion: v1
kind: Namespace
metadata:
  name: photoprism
---
apiVersion: v1
kind: Secret
metadata:
  name: photoprism-photoprism-secrets
  namespace: photoprism
stringData:
  PHOTOPRISM_ADMIN_PASSWORD: changeme
type: Opaque
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: photoprism
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: photoprism
    helm.sh/chart: photoprism-plus-1.0.4
  name: photoprism-photoprism
  namespace: photoprism
spec:
  ports:
  - name: http
    port: 2342
    targetPort: 2342
  selector:
    app.kubernetes.io/instance: photoprism
    app.kubernetes.io/name: photoprism
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/instance: photoprism
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: photoprism
    helm.sh/chart: photoprism-plus-1.0.4
  name: photoprism-photoprism-originals
  namespace: photoprism
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: ceph-block
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/instance: photoprism
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: photoprism
    helm.sh/chart: photoprism-plus-1.0.4
  name: photoprism-photoprism-storage
  namespace: photoprism
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: ceph-block
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/instance: photoprism
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: photoprism
    helm.sh/chart: photoprism-plus-1.0.4
  name: photoprism-photoprism
  namespace: photoprism
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: photoprism
      app.kubernetes.io/name: photoprism
  serviceName: photoprism-photoprism
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: photoprism
        app.kubernetes.io/name: photoprism
    spec:
      containers:
      - env:
        - name: PHOTOPRISM_SITE_URL
          value: https://photos.srbii.com/
        - name: PHOTOPRISM_ADMIN_USER
          value: admin
        - name: PHOTOPRISM_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              key: PHOTOPRISM_ADMIN_PASSWORD
              name: photoprism-photoprism-secrets
        - name: PHOTOPRISM_DATABASE_DRIVER
          value: sqlite
        - name: PHOTOPRISM_DATABASE_NAME
          value: photoprism
        - name: PHOTOPRISM_DATABASE_USER
          value: photoprism
        - name: PHOTOPRISM_DATABASE_TIMEOUT
          value: "15"
        - name: PHOTOPRISM_DATABASE_CONNS
          value: "0"
        - name: PHOTOPRISM_DATABASE_CONNS_IDLE
          value: "0"
        - name: PHOTOPRISM_DISABLE_OIDC
          value: "false"
        - name: PHOTOPRISM_OIDC_CLIENT
          value: photoprism-client
        - name: PHOTOPRISM_OIDC_PROVIDER
          value: Keycloak
        - name: PHOTOPRISM_OIDC_REDIRECT
          value: "false"
        - name: PHOTOPRISM_OIDC_REGISTER
          value: "true"
        - name: PHOTOPRISM_OIDC_SCOPES
          value: openid email profile
        - name: PHOTOPRISM_OIDC_URI
          value: https://auth.srbii.com/realms/homelab
        - name: PHOTOPRISM_OIDC_USERNAME
          value: email
        - name: PHOTOPRISM_OIDC_WEBDAV
          value: "false"
        - name: PHOTOPRISM_APP_COLOR
          value: '#1d1d1e'
        - name: PHOTOPRISM_APP_NAME
          value: PhotoPrism
        - name: PHOTOPRISM_AUTH_MODE
          value: password
        - name: PHOTOPRISM_BACKUP_ALBUMS
          value: "true"
        - name: PHOTOPRISM_BACKUP_DATABASE
          value: "true"
        - name: PHOTOPRISM_BACKUP_RETAIN
          value: "3"
        - name: PHOTOPRISM_BACKUP_SCHEDULE
          value: daily
        - name: PHOTOPRISM_CORS_HEADERS
          value: Accept, Accept-Ranges, Content-Disposition, Content-Encoding, Content-Range,
            Location
        - name: PHOTOPRISM_CORS_METHODS
          value: GET, HEAD, OPTIONS
        - name: PHOTOPRISM_DEFAULT_LOCALE
          value: en
        - name: PHOTOPRISM_DISABLE_STS
          value: "true"
        - name: PHOTOPRISM_DISABLE_TLS
          value: "true"
        - name: PHOTOPRISM_FILES_QUOTA
          value: "0"
        - name: PHOTOPRISM_HTTP_COMPRESSION
          value: gzip
        - name: PHOTOPRISM_IMPORT_ALLOW
          value: zip,jpeg,jpg,png,gif,bmp,avif,webp,heic,heif,tiff,pdf,ai,svg,xmp
        - name: PHOTOPRISM_LOG_LEVEL
          value: info
        - name: PHOTOPRISM_ORIGINALS_LIMIT
          value: "50000"
        - name: PHOTOPRISM_PASSWORD_LENGTH
          value: "8"
        - name: PHOTOPRISM_PLACES_LOCALE
          value: local
        - name: PHOTOPRISM_SESSION_CACHE
          value: "900"
        - name: PHOTOPRISM_SESSION_MAXAGE
          value: "1209600"
        - name: PHOTOPRISM_SESSION_TIMEOUT
          value: "604800"
        - name: PHOTOPRISM_SITE_CAPTION
          value: AI-Powered Photos
        - name: PHOTOPRISM_SITE_TITLE
          value: Photos
        - name: PHOTOPRISM_UPLOAD_ALLOW
          value: zip,jpeg,jpg,png,gif,bmp,avif,webp,heic,heif,tiff,pdf,ai,svg,xmp
        - name: PHOTOPRISM_UPLOAD_ARCHIVES
          value: "true"
        - name: PHOTOPRISM_UPLOAD_LIMIT
          value: "5000"
        - name: PHOTOPRISM_UPLOAD_NSFW
          value: "true"
        envFrom:
        - secretRef:
            name: photoprism-oidc-secret
        image: docker.io/photoprism/photoprism:ce
        imagePullPolicy: IfNotPresent
        name: photoprism-plus
        ports:
        - containerPort: 2342
          name: http
        securityContext:
          allowPrivilegeEscalation: true
          capabilities:
            drop:
            - ALL
          runAsGroup: 0
          runAsNonRoot: false
          runAsUser: 0
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - mountPath: /photoprism/originals
          name: originals
        - mountPath: /photoprism/storage
          name: storage
      securityContext:
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch
      volumes:
      - name: originals
        persistentVolumeClaim:
          claimName: photoprism-photoprism-originals
      - name: storage
        persistentVolumeClaim:
          claimName: photoprism-photoprism-storage
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: photoprism-oidc-secret
  namespace: photoprism
spec:
  encryptedData:
    PHOTOPRISM_OIDC_SECRET: 
  template:
    metadata:
      name: photoprism-oidc-secret
      namespace: photoprism
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: photoprism
  namespace: photoprism
spec:
  hostnames:
  - photos.srbii.com
  parentRefs:
  - name: kgateway-http
    namespace: kgateway-system
  rules:
  - backendRefs:
    - name: photoprism-photoprism
      port: 2342
    matches:
    - path:
        type: PathPrefix
        value: /
