apiVersion: v1
kind: Namespace
metadata:
  labels:
    name: netbootxyz
  name: netbootxyz
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    omni-kube-service-exposer.sidero.dev/label: Netboot.xyz
    omni-kube-service-exposer.sidero.dev/prefix: netboot
  name: netbootxyz
  namespace: netbootxyz
spec:
  ports:
  - name: webui
    port: 3000
    protocol: TCP
    targetPort: 3000
  - name: assets
    port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/name: netbootxyz
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: netbootxyz-web
  namespace: netbootxyz
spec:
  ports:
  - name: proxy
    port: 4180
    targetPort: 4180
  selector:
    app.kubernetes.io/name: netbootxyz
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: netbootxyz-assets
  namespace: netbootxyz
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: ceph-block
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: netbootxyz-config
  namespace: netbootxyz
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: ceph-block
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: netbootxyz
  name: netbootxyz
  namespace: netbootxyz
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: netbootxyz
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        k8s.v1.cni.cncf.io/networks: netbootxyz-macvlan
      labels:
        app.kubernetes.io/name: netbootxyz
    spec:
      containers:
      - env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: America/Los_Angeles
        image: ghcr.io/linuxserver/netbootxyz:latest
        imagePullPolicy: IfNotPresent
        name: netbootxyz
        ports:
        - containerPort: 3000
          name: webui
          protocol: TCP
        - containerPort: 69
          name: tftp
          protocol: UDP
        - containerPort: 67
          name: dhcp
          protocol: UDP
        - containerPort: 8080
          name: assets
          protocol: TCP
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - NET_BIND_SERVICE
            - NET_BROADCAST
            - NET_RAW
          runAsNonRoot: false
          runAsUser: 0
        volumeMounts:
        - mountPath: /config
          name: config
        - mountPath: /assets
          name: assets
      - args:
        - --provider=oidc
        - --oidc-issuer-url=https://auth.srbii.com/realms/homelab
        - --upstream=http://127.0.0.1:3000
        - --http-address=0.0.0.0:4180
        - --email-domain=*
        - --pass-user-headers=true
        - --pass-authorization-header=true
        - --cookie-secure=true
        - --redirect-url=https://boot.srbii.com/oauth2/callback
        - --cookie-domain=.srbii.com
        - --whitelist-domain=.srbii.com
        - --skip-provider-button=true
        envFrom:
        - secretRef:
            name: oauth2-proxy-secret
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
        name: oauth2-proxy
        ports:
        - containerPort: 4180
          name: proxy
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 32Mi
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: netbootxyz-config
      - name: assets
        persistentVolumeClaim:
          claimName: netbootxyz-assets
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: oauth2-proxy-secret
  namespace: netbootxyz
spec:
  encryptedData:
    OAUTH2_PROXY_CLIENT_ID: 
    OAUTH2_PROXY_CLIENT_SECRET: 
    OAUTH2_PROXY_COOKIE_SECRET: 
  template:
    metadata:
      name: oauth2-proxy-secret
      namespace: netbootxyz
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: netbootxyz
  namespace: netbootxyz
spec:
  hostnames:
  - boot.srbii.com
  parentRefs:
  - name: kgateway-http
    namespace: kgateway-system
  rules:
  - backendRefs:
    - name: netbootxyz-web
      port: 4180
    matches:
    - path:
        type: PathPrefix
        value: /
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: netbootxyz-macvlan
  namespace: netbootxyz
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": "eth0",
      "mode": "bridge",
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.8.0/24",
        "rangeStart": "192.168.8.250",
        "rangeEnd": "192.168.8.250",
        "gateway": "192.168.8.1"
      }
    }
