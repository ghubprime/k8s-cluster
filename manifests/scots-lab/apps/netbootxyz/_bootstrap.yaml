apiVersion: v1
kind: Namespace
metadata:
  labels:
    name: netbootxyz
  name: netbootxyz
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    omni-kube-service-exposer.sidero.dev/label: Netboot.xyz
    omni-kube-service-exposer.sidero.dev/prefix: netboot
  name: netbootxyz
  namespace: netbootxyz
spec:
  ports:
  - name: webui
    port: 3000
    protocol: TCP
    targetPort: 3000
  - name: assets
    port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/name: netbootxyz
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: netbootxyz-assets
  namespace: netbootxyz
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: ceph-block
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: netbootxyz-config
  namespace: netbootxyz
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: ceph-block
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: netbootxyz
  name: netbootxyz
  namespace: netbootxyz
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: netbootxyz
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        k8s.v1.cni.cncf.io/networks: netbootxyz-macvlan
      labels:
        app.kubernetes.io/name: netbootxyz
    spec:
      containers:
      - env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: America/Los_Angeles
        image: ghcr.io/linuxserver/netbootxyz:latest
        imagePullPolicy: IfNotPresent
        name: netbootxyz
        ports:
        - containerPort: 3000
          name: webui
          protocol: TCP
        - containerPort: 69
          name: tftp
          protocol: UDP
        - containerPort: 67
          name: dhcp
          protocol: UDP
        - containerPort: 8080
          name: assets
          protocol: TCP
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - NET_BIND_SERVICE
            - NET_BROADCAST
            - NET_RAW
          runAsNonRoot: false
          runAsUser: 0
        volumeMounts:
        - mountPath: /config
          name: config
        - mountPath: /assets
          name: assets
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: netbootxyz-config
      - name: assets
        persistentVolumeClaim:
          claimName: netbootxyz-assets
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: netbootxyz-macvlan
  namespace: netbootxyz
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": "eth0",
      "mode": "bridge",
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.8.0/24",
        "rangeStart": "192.168.8.250",
        "rangeEnd": "192.168.8.250",
        "gateway": "192.168.8.1"
      }
    }
