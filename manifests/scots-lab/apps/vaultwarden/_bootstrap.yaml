      app.kubernetes.io/component: vaultwarden
      app.kubernetes.io/instance: vaultwarden
      app.kubernetes.io/name: vaultwarden
  serviceName: vaultwarden
  template:
    metadata:
      annotations:
        checksum/config: dbefb84d6f94f8743325b1193df5da8838ad947c
        checksum/secret: 3a6ca17493d82c815f0e16b05b768b5c66f657cc
      labels:
        app.kubernetes.io/component: vaultwarden
        app.kubernetes.io/instance: vaultwarden
        app.kubernetes.io/name: vaultwarden
    spec:
      containers:
      - env:
        - name: ADMIN_TOKEN
          valueFrom:
            secretKeyRef:
              key: admin-token
              name: vaultwarden-admin-token
        envFrom:
        - configMapRef:
            name: vaultwarden
        image: docker.io/vaultwarden/server:1.34.1-alpine
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 10
          httpGet:
            path: /alive
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        name: vaultwarden
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /alive
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        volumeMounts:
        - mountPath: /data
          name: vaultwarden-data
      serviceAccountName: vaultwarden-svc
  volumeClaimTemplates:
  - metadata:
      annotations:
        meta.helm.sh/release-name: vaultwarden
        meta.helm.sh/release-namespace: vaultwarden
      labels:
        app.kubernetes.io/component: vaultwarden
        app.kubernetes.io/instance: vaultwarden
        app.kubernetes.io/name: vaultwarden
      name: vaultwarden-data
    spec:
