apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app: whereabouts
    tier: node
  name: whereabouts
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: whereabouts
  template:
    metadata:
      labels:
        app: whereabouts
        name: whereabouts
        tier: node
    spec:
      containers:
      - args:
        - -c
        - |
          SLEEP=false source /install-cni.sh
          /token-watcher.sh &
          /ip-control-loop -log-level debug
        command:
        - /bin/sh
        env:
        - name: NODENAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: WHEREABOUTS_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        image: ghcr.io/k8snetworkplumbingwg/whereabouts:latest
        name: whereabouts
        resources:
          limits:
            cpu: 100m
            memory: 200Mi
          requests:
            cpu: 100m
            memory: 100Mi
        securityContext:
          privileged: true
        volumeMounts:
        - mountPath: /host/opt/cni/bin
          name: cnibin
        - mountPath: /host/etc/cni/net.d
          name: cni-net-dir
        - mountPath: /cron-schedule
          name: cron-scheduler-configmap
      hostNetwork: true
      serviceAccountName: whereabouts
      tolerations:
      - effect: NoSchedule
        operator: Exists
      volumes:
      - hostPath:
          path: /opt/cni/bin
        name: cnibin
      - hostPath:
          path: /etc/cni/net.d
        name: cni-net-dir
      - configMap:
          defaultMode: 484
          items:
          - key: cron-expression
            path: config
          name: whereabouts-config
        name: cron-scheduler-configmap
  updateStrategy:
    type: RollingUpdate
