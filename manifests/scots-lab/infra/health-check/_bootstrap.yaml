apiVersion: v1
kind: ServiceAccount
metadata:
  name: health-checker
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: health-checker-role
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - nodes
  verbs:
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: health-checker-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: health-checker-role
subjects:
- kind: ServiceAccount
  name: health-checker
  namespace: kube-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: daily-health-check
  namespace: kube-system
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - args:
            - |
              UNHEALTHY=$(kubectl get pods -A --field-selector 'status.phase!=Running,status.phase!=Succeeded' --no-headers 2>/dev/null | wc -l)
              NODES=$(kubectl get nodes --no-headers | grep -v " Ready" | wc -l)
              if [ "$UNHEALTHY" -gt 0 ] || [ "$NODES" -gt 0 ]; then
                curl -d "⚠️ Cluster Health: $UNHEALTHY unhealthy pods, $NODES problem nodes" http://ntfy.ntfy.svc.cluster.local/alerts
              else
                curl -d "✅ Cluster Healthy: All pods running, all nodes ready" http://ntfy.ntfy.svc.cluster.local/alerts
              fi
            command:
            - /bin/sh
            - -c
            image: bitnami/kubectl:1.30.1
            name: check
          restartPolicy: Never
          serviceAccountName: health-checker
  schedule: 0 8 * * *
