# Default values for keycloakx (codecentric chart)
# These are common defaults that apply to all environments

image:
  repository: quay.io/keycloak/keycloak
  pullPolicy: IfNotPresent

replicas: 1

health:
  enabled: true

metrics:
  enabled: true

http:
  relativePath: "/"
  internalPort: http-internal
  internalScheme: HTTP

proxy:
  enabled: true
  mode: edge
  http:
    enabled: true
