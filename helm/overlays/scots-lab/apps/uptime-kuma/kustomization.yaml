apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../base/apps/uptime-kuma/

patches:
  - target:
      kind: HelmChartInflationGenerator
      name: uptime-kuma
    patch: |-
      - op: replace
        path: /valuesFile
        value: ../../../../../helm/overlays/scots-lab/apps/uptime-kuma/values-scots-lab.yaml
