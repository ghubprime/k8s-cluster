apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../base/apps/sealed-secrets/

patches:
  - target:
      kind: HelmChartInflationGenerator
      name: sealed-secrets
    patch: |-
      - op: replace
        path: /valuesFile
        value: values-scots-lab.yaml
