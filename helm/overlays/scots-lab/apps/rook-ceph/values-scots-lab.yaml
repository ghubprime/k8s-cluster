# Rook Ceph Operator values for monitoring
monitoring:
  enabled: true

resources:
  requests:
    cpu: 10m
    memory: 128Mi

# Homelab CSI resource overrides — defaults allocate 300m per CSI node plugin
# (250m driver + 50m registrar) × 6 plugins (3 nodes × 2 drivers) = 1800m total.
# Reduced to free up CPU headroom across all nodes.
csi:
  csiRBDPluginResource: |
    - name : driver-registrar
      resource:
        requests:
          memory: 64Mi
          cpu: 15m
        limits:
          memory: 256Mi
    - name : csi-rbdplugin
      resource:
        requests:
          memory: 256Mi
          cpu: 50m
        limits:
          memory: 1Gi
    - name : liveness-prometheus
      resource:
        requests:
          memory: 64Mi
          cpu: 15m
        limits:
          memory: 256Mi
  csiCephFSPluginResource: |
    - name : driver-registrar
      resource:
        requests:
          memory: 64Mi
          cpu: 15m
        limits:
          memory: 256Mi
    - name : csi-cephfsplugin
      resource:
        requests:
          memory: 256Mi
          cpu: 50m
        limits:
          memory: 1Gi
    - name : liveness-prometheus
      resource:
        requests:
          memory: 64Mi
          cpu: 15m
        limits:
          memory: 256Mi
  csiRBDProvisionerResource: |
    - name : csi-provisioner
      resource:
        requests:
          memory: 64Mi
          cpu: 25m
        limits:
          memory: 256Mi
    - name : csi-resizer
      resource:
        requests:
          memory: 64Mi
          cpu: 25m
        limits:
          memory: 256Mi
    - name : csi-attacher
      resource:
        requests:
          memory: 64Mi
          cpu: 25m
        limits:
          memory: 256Mi
    - name : csi-snapshotter
      resource:
        requests:
          memory: 64Mi
          cpu: 25m
        limits:
          memory: 256Mi
    - name : csi-rbdplugin
      resource:
        requests:
          memory: 256Mi
        limits:
          memory: 1Gi
    - name : csi-omap-generator
      resource:
        requests:
          memory: 256Mi
          cpu: 50m
        limits:
          memory: 1Gi
    - name : liveness-prometheus
      resource:
        requests:
          memory: 64Mi
          cpu: 15m
        limits:
          memory: 256Mi
  csiCephFSProvisionerResource: |
    - name : csi-provisioner
      resource:
        requests:
          memory: 64Mi
          cpu: 25m
        limits:
          memory: 256Mi
    - name : csi-resizer
