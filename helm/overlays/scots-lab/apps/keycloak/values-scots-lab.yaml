# Keycloak values for scots-lab environment
# Uses codecentric/keycloakx chart with official quay.io image

image:
  repository: quay.io/keycloak/keycloak
  tag: "26.5.5"
  pullPolicy: IfNotPresent

replicas: 1

# Start in development mode (built-in H2 database, no external PostgreSQL required)
# For production, switch to 'start' and configure external database
command:
  - "/opt/keycloak/bin/kc.sh"
args:
  - "start-dev"

# Serve from root path (modern Keycloak does not use /auth prefix)
http:
  relativePath: "/"
  internalPort: http-internal
  internalScheme: HTTP

# Proxy mode for behind reverse-proxy
proxy:
  enabled: true
  mode: forwarded
  http:
    enabled: true

# Health and metrics
health:
  enabled: true

metrics:
  enabled: true

# Admin credentials from SealedSecret (using modern env var names)
extraEnv: |
  - name: KC_BOOTSTRAP_ADMIN_USERNAME
    value: admin
  - name: KC_BOOTSTRAP_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-admin-credentials
        key: admin-password

# Resource limits for homelab
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Ingress via Cilium
ingress:
  enabled: false
  ingressClassName: "cilium"
  rules:
    - host: keycloak.proxy-us.srbii.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
