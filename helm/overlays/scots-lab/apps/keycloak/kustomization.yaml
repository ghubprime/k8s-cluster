apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../base/apps/keycloak/

patches:
  - target:
      kind: HelmChartInflationGenerator
      name: keycloakx
    patch: |-
      - op: replace
        path: /valuesFile
        value: ../../../../../helm/overlays/scots-lab/apps/keycloak/values-scots-lab.yaml
