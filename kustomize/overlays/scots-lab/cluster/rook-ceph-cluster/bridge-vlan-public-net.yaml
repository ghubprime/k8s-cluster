apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: public-net
  namespace: rook-ceph
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "name": "public-net",
      "type": "bridge",
      "bridge": "br-ext",
      
      "ipam": {
        "type": "whereabouts",
        "range": "10.10.0.0/16",
        "exclude": [
          "10.10.0.0/24"
        ],
        "gateway": "10.10.255.254"
      }
    }
