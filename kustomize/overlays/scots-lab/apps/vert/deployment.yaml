apiVersion: apps/v1
kind: Deployment
metadata:
  name: vert
  namespace: vert
  labels:
    app: vert
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vert
  template:
    metadata:
      labels:
        app: vert
    spec:
      containers:
        - name: vert
          image: ghcr.io/vert-sh/vert:latest
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi

        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://auth.srbii.com/realms/homelab
            - --upstream=http://127.0.0.1:80
            - --http-address=0.0.0.0:4180
            - --email-domain=*
            - --pass-user-headers=true
            - --pass-authorization-header=true
            - --cookie-secure=true
            - --redirect-url=https://vert.srbii.com/oauth2/callback
            - --cookie-domain=.srbii.com
            - --whitelist-domain=.srbii.com
            - --skip-provider-button=true
          envFrom:
            - secretRef:
                name: oauth2-proxy-secret
          ports:
            - containerPort: 4180
              name: proxy
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
