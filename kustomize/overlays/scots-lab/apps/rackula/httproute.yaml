apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rackula
  namespace: rackula
spec:
  parentRefs:
    - name: kgateway-http
      namespace: kgateway-system
  hostnames:
    - "rack.srbii.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: rackula
          port: 4180
