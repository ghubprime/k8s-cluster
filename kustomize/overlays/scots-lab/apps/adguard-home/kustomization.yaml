apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: adguard-home

resources:
  - namespace.yaml
  - pvc.yaml
  - route.yaml

helmCharts:
  - name: app-template
    repo: https://bjw-s-labs.github.io/helm-charts/
    version: 3.2.1
    releaseName: adguard-home
    namespace: adguard-home
    valuesFile: values.yaml
