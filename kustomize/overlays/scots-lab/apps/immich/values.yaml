controllers:
  main:
    containers:
      main:
        env:
          DB_HOSTNAME: "immich-postgres"
          DB_USERNAME: "immich"
          DB_PASSWORD: "immich"
          DB_DATABASE_NAME: "immich"
          REDIS_HOSTNAME: "immich-redis-master"

server:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

machine-learning:
  resources:
    requests:
      cpu: 100m
      memory: 500Mi
    limits:
      cpu: 2000m
      memory: 2Gi

immich:
  persistence:
    library:
      existingClaim: immich-library-pvc
