apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: immich
resources:
  - ../../../../base/apps/immich/
  - httproute.yaml
  - pvc.yaml
  - postgres.yaml
  - redis.yaml
helmCharts:
  - name: immich
    repo: https://immich-app.github.io/immich-charts
    version: "0.11.1"
    releaseName: immich
    namespace: immich
    valuesFile: values.yaml
