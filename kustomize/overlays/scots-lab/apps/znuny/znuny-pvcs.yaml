apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: znuny-var
  namespace: znuny
  labels:
    app: znuny-app
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-block
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: znuny-config
  namespace: znuny
  labels:
    app: znuny-app
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-block
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: znuny-custom
  namespace: znuny
  labels:
    app: znuny-app
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-block
  resources:
    requests:
      storage: 1Gi
