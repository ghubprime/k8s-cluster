apiVersion: apps/v1
kind: Deployment
metadata:
  name: znuny-app
  namespace: znuny
  labels:
    app: znuny-app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: znuny-app
  template:
    metadata:
      labels:
        app: znuny-app
    spec:
      # Init container waits for MariaDB readiness before starting Znuny
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MariaDB to be ready..."
              until nc -z znuny-mariadb 3306; do
                echo "MariaDB not ready yet, retrying in 3s..."
                sleep 3
              done
              echo "MariaDB is ready!"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --provider=oidc
            - --client-id=$(OAUTH2_PROXY_CLIENT_ID)
            - --client-secret=$(OAUTH2_PROXY_CLIENT_SECRET)
            - --cookie-secret=$(OAUTH2_PROXY_COOKIE_SECRET)
            - --oidc-issuer-url=https://auth.srbii.com/realms/homelab
            - --upstream=http://127.0.0.1:80
            - --http-address=0.0.0.0:4180
            - --email-domain=*
            - --pass-user-headers=true
            - --pass-authorization-header=true
            - --cookie-secure=true
          envFrom:
            - secretRef:
                name: oauth2-proxy-secret
          ports:
            - containerPort: 4180
              name: proxy
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi

        - name: znuny
          image: docker.io/andreynsafonov/znuny:7.2.3
          ports:
            - containerPort: 80
              name: http
          env:
            - name: TZ
              value: "UTC"
            - name: ZNUNY_DB_TYPE
              value: "mysql"
            - name: ZNUNY_DB_HOST
              value: "znuny-mariadb"
            - name: ZNUNY_DB_NAME
              value: "znuny"
            - name: ZNUNY_DB_USER
              value: "znuny"
            - name: ZNUNY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: znuny-db-secret
                  key: MYSQL_PASSWORD
            - name: ZNUNY_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: znuny-db-secret
                  key: ZNUNY_ROOT_PASSWORD
            - name: ZNUNY_FQDN
              value: "tickets.srbii.com"
            - name: ZNUNY_AUTO_INSTALL
              value: "true"
            - name: ZNUNY_ORGANIZATION
              value: "Scots Lab"
          volumeMounts:
            - name: apache-oidc-config
              mountPath: /etc/apache2/conf-enabled/oidc-header.conf
              subPath: oidc-header.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 8
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 600
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      volumes:
        - name: apache-oidc-config
          configMap:
            name: apache-oidc-config
            defaultMode: 0644
