apiVersion: apps/v1
kind: Deployment
metadata:
  name: znuny-app
  namespace: znuny
  labels:
    app: znuny-app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: znuny-app
  template:
    metadata:
      labels:
        app: znuny-app
    spec:
      # Init container waits for MariaDB readiness before starting Znuny
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MariaDB to be ready..."
              until nc -z znuny-mariadb 3306; do
                echo "MariaDB not ready yet, retrying in 3s..."
                sleep 3
              done
              echo "MariaDB is ready!"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: znuny
          image: docker.io/andreynsafonov/znuny:7.2.3
          ports:
            - containerPort: 80
              name: http
          env:
            - name: TZ
              value: "UTC"
            - name: ZNUNY_DB_TYPE
              value: "mysql"
            - name: ZNUNY_DB_HOST
              value: "znuny-mariadb"
            - name: ZNUNY_DB_NAME
              value: "znuny"
            - name: ZNUNY_DB_USER
              value: "znuny"
            - name: ZNUNY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: znuny-db-secret
                  key: MYSQL_PASSWORD
            - name: ZNUNY_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: znuny-db-secret
                  key: ZNUNY_ROOT_PASSWORD
            - name: ZNUNY_FQDN
              value: "tickets.srbii.com"
            - name: ZNUNY_AUTO_INSTALL
              value: "true"
            - name: ZNUNY_ORGANIZATION
              value: "Scots Lab"
          # No volume mounts for /opt/znuny — the image contains the full
          # Znuny installation. All persistent state lives in MariaDB.
          # Mounting a PVC at /opt/znuny would shadow the application files
          # since the image does not copy files into the volume on first boot.
          # Readiness probe checks if Apache is serving content
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 8
          # Liveness probe with generous startup allowance
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          # Container needs root for Apache, cron, and Znuny daemon
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
