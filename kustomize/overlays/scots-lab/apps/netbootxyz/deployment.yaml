apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbootxyz
  namespace: netbootxyz
  labels:
    app.kubernetes.io/name: netbootxyz
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: netbootxyz
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netbootxyz
      annotations:
        k8s.v1.cni.cncf.io/networks: netbootxyz-macvlan
    spec:
      containers:
        - name: netbootxyz
          image: ghcr.io/linuxserver/netbootxyz:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/Los_Angeles"
          ports:
            - containerPort: 3000
              name: webui
              protocol: TCP
            - containerPort: 69
              name: tftp
              protocol: UDP
            - containerPort: 67
              name: dhcp
              protocol: UDP
            - containerPort: 8080
              name: assets
              protocol: TCP
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            capabilities:
              add:
                - NET_ADMIN
                - NET_BIND_SERVICE
                - NET_BROADCAST
                - NET_RAW
          volumeMounts:
            - name: config
              mountPath: /config
            - name: assets
              mountPath: /assets
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: netbootxyz-config
        - name: assets
          persistentVolumeClaim:
            claimName: netbootxyz-assets
