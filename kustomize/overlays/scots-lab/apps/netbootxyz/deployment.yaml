apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbootxyz
  namespace: netbootxyz
  labels:
    app.kubernetes.io/name: netbootxyz
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: netbootxyz
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netbootxyz
      annotations:
        k8s.v1.cni.cncf.io/networks: netbootxyz-macvlan
    spec:
      containers:
        - name: netbootxyz
          image: lscr.io/linuxserver/netbootxyz:latest
          imagePullPolicy: Always
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/Los_Angeles"
          ports:
            - containerPort: 3000
              name: webui
              protocol: TCP
            - containerPort: 69
              name: tftp
              protocol: UDP
            - containerPort: 67
              name: dhcp
              protocol: UDP
            - containerPort: 8080
              name: assets
              protocol: TCP
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            capabilities:
              add:
                - NET_ADMIN
                - NET_BIND_SERVICE
                - NET_BROADCAST
                - NET_RAW
          volumeMounts:
            - name: config
              mountPath: /config
            - name: assets
              mountPath: /assets

        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://auth.srbii.com/realms/homelab
            - --upstream=http://127.0.0.1:3000
            - --http-address=0.0.0.0:4180
            - --email-domain=*
            - --pass-user-headers=true
            - --pass-authorization-header=true
            - --cookie-secure=true
            - --redirect-url=https://boot.srbii.com/oauth2/callback
            - --cookie-domain=.srbii.com
            - --whitelist-domain=.srbii.com
            - --skip-provider-button=true
          envFrom:
            - secretRef:
                name: oauth2-proxy-secret
          ports:
            - containerPort: 4180
              name: proxy
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: netbootxyz-config
        - name: assets
          persistentVolumeClaim:
            claimName: netbootxyz-assets
