global:
  env: scots-lab
  helmDefault: false
  valuesFile: values.yaml
  spec:
    project: default
    destination:
      server: https://kubernetes.default.svc
      namespace: default
    source:
      repoURL: https://github.com/ghubprime/k8s-cluster.git
      targetRevision: HEAD

argocdApplications:
  argocd:
    disableAutomated: false
    disable: false
    name: argocd
    namespace: argocd
    appCategory: apps
    syncWave: "1"
  talos:
    disableAutomated: false
    disable: false
    name: talos
    namespace: talos-system
    appCategory: cluster
    syncWave: "1"
  omni:
    repoURL: https://github.com/ghubprime/omni-infra.git
    path: "."
    disableAutomated: false
    disable: false
    name: omni
    namespace: omni-system
    directory:
      recurse: true
      include: "{manifests/*}"
    appCategory: cluster
    syncWave: "1"
  hostNetwork:
    disableAutomated: false
    disable: true
    name: host-network
    namespace: kube-system
    appCategory: infra
    syncWave: "0"
  multus:
