apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: nextcloud
resources:
  - ../../../../base/apps/nextcloud/
  - httproute.yaml
  - nextcloud-auth-secret-patch.yaml
helmCharts:
- name: nextcloud
  repo: https://nextcloud.github.io/helm/
  version: 4.6.4
  releaseName: nextcloud
  namespace: nextcloud
  includeCRDs: true
  valuesFile: ../../../../../helm/overlays/scots-lab/apps/nextcloud/values-scots-lab.yaml
