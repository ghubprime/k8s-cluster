apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: photoprism
resources:
  - ../../../../base/apps/photoprism/
  - httproute.yaml
  - sealed-photoprism-oidc.yaml
patches:
  - path: photoprism-oidc-env-patch.yaml
helmCharts:
  - name: photoprism-plus
    repo: https://charts.photoprism.app/photoprism
    version: "1.0.4"
    releaseName: photoprism
    namespace: photoprism
    valuesFile: ../../../../../helm/overlays/scots-lab/apps/photoprism/values-scots-lab.yaml
