dex:
  enabled: false
notifications:
  enabled: false
applicationSet:
  enabled: false
server:
  extraArgs:
    - --insecure
configs:
  cm:
    url: https://argocd.srbii.com
    oidc.config: |
      name: Keycloak
      issuer: https://auth.srbii.com/realms/homelab
      clientID: argocd-client
      clientSecret: $argocd-oidc-secret:oidc.keycloak.clientSecret
      requestedScopes: ["openid", "profile", "email", "groups"]