# Grafana Alloy values for scots-lab
# Replaces deprecated Promtail as the log collector DaemonSet
# Ships container logs from every node to Loki

alloy:
  # Alloy configuration in River format
  configMap:
    content: |
      // Discover all Kubernetes pods
      discovery.kubernetes "pods" {
        role = "pod"
      }

      // Relabel discovered targets to extract useful metadata
      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets

        // Keep only pods that have logs
        rule {
          source_labels = ["__meta_kubernetes_pod_phase"]
          regex         = "Succeeded|Failed"
          action        = "drop"
        }

        // Set the namespace label
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        // Set the pod label
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        // Set the container label
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }

        // Set the node label
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }

        // Set the app label from common Kubernetes labels
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }

        // Use the pod UID and container name as the path for log files
        rule {
          source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
          separator     = "/"
          target_label  = "__path__"
          replacement   = "/var/log/pods/*$1/*.log"
        }
      }

      // Read log files from discovered pod paths
      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pods.output
        forward_to = [loki.write.default.receiver]
      }

      // Ship logs to the Loki instance
      loki.write "default" {
        endpoint {
          url = "http://loki.loki.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

# Deploy as DaemonSet to collect logs from all nodes
controller:
  type: daemonset

# Resource limits for the collector
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Mount host log paths for reading container logs
mounts:
  varlog: true

# ServiceMonitor for Prometheus to scrape Alloy metrics
serviceMonitor:
  enabled: true
