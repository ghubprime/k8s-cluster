apiVersion: v1
kind: ServiceAccount
metadata:
  name: crowdsec-allowlist-provisioner
  namespace: crowdsec
  annotations:
    argocd.argoproj.io/sync-wave: "5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crowdsec-allowlist-provisioner-role
  namespace: crowdsec
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
- apiGroups: [""]
  resources: ["pods", "pods/exec", "pods/log"]
  verbs: ["get", "list", "watch", "create"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crowdsec-allowlist-provisioner-rolebinding
  namespace: crowdsec
  annotations:
    argocd.argoproj.io/sync-wave: "5"
subjects:
- kind: ServiceAccount
  name: crowdsec-allowlist-provisioner
  namespace: crowdsec
roleRef:
  kind: Role
  name: crowdsec-allowlist-provisioner-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crowdsec-allowlist-provisioner-clusterrole
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
- apiGroups: ["cilium.io"]
  resources: ["ciliumclusterwidenetworkpolicies"]
  verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crowdsec-allowlist-provisioner-clusterrolebinding
  annotations:
    argocd.argoproj.io/sync-wave: "5"
subjects:
- kind: ServiceAccount
  name: crowdsec-allowlist-provisioner
  namespace: crowdsec
roleRef:
  kind: ClusterRole
  name: crowdsec-allowlist-provisioner-clusterrole
  apiGroup: rbac.authorization.k8s.io
