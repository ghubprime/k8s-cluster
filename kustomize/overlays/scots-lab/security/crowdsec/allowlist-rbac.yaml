apiVersion: v1
kind: ServiceAccount
metadata:
  name: crowdsec-allowlist-provisioner
  namespace: crowdsec
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crowdsec-allowlist-provisioner
  namespace: crowdsec
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crowdsec-allowlist-provisioner
  namespace: crowdsec
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: crowdsec-allowlist-provisioner
subjects:
  - kind: ServiceAccount
    name: crowdsec-allowlist-provisioner
    namespace: crowdsec
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crowdsec-allowlist-ccwnp-cleaner
rules:
  - apiGroups: ["cilium.io"]
    resources: ["ciliumclusterwidenetworkpolicies"]
    verbs: ["deletecollection", "list", "get", "delete"]
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crowdsec-allowlist-ccwnp-cleaner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crowdsec-allowlist-ccwnp-cleaner
subjects:
  - kind: ServiceAccount
    name: crowdsec-allowlist-provisioner
    namespace: crowdsec
