apiVersion: batch/v1
kind: Job
metadata:
  name: crowdsec-allowlist-provisioner
  namespace: crowdsec
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crowdsec-allowlist-provisioner
    spec:
      serviceAccountName: crowdsec-allowlist-provisioner
      containers:
      - name: provisioner
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for Crowdsec LAPI deployment to be fully available (up to 120s)..."
          kubectl wait -n crowdsec --for=condition=available deployment/crowdsec-lapi --timeout=120s
          
          echo "Creating Centralized Allowlist for omni-proxy..."
          kubectl exec -n crowdsec deploy/crowdsec-lapi -- cscli allowlists create omni-proxy-whitelist -d "Sidero Omni Control Plane Proxy & internal networks" || true
          
          echo "Injecting trusted IPs into the whitelist..."
          kubectl exec -n crowdsec deploy/crowdsec-lapi -- cscli allowlists add omni-proxy-whitelist 34.82.1.163
          kubectl exec -n crowdsec deploy/crowdsec-lapi -- cscli allowlists add omni-proxy-whitelist 192.168.8.0/24
          
          echo "Purging any ghost CAPI decisions that may have been downloaded during boot..."
          kubectl exec -n crowdsec deploy/crowdsec-lapi -- cscli decisions delete --ip 34.82.1.163 || true
          kubectl exec -n crowdsec deploy/crowdsec-lapi -- cscli decisions delete --range 192.168.8.0/24 || true
          
          echo "Performing final kernel-level flush of clusterwide eBPF blocklists as an ultimate precaution..."
          kubectl delete ccwnp --all || true
          
          echo "Provisioning sequence completed and secured!"
      restartPolicy: OnFailure
