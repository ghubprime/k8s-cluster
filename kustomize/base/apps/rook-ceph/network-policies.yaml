apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rook-ceph-deny-external-ingress
  namespace: rook-ceph
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: rook-ceph
    - from:
        - namespaceSelector:
            matchLabels:
              name: kube-prometheus-system
      ports:
        - port: 9283
          protocol: TCP
