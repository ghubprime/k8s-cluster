apiVersion: apps/v1
kind: Deployment
metadata:
  name: crowdsec-envoy-bouncer
  namespace: crowdsec
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crowdsec-envoy-bouncer
  template:
    metadata:
      labels:
        app: crowdsec-envoy-bouncer
    spec:
      containers:
        - name: bouncer
          image: docker.io/crowdsecurity/envoy-bouncer:latest
          ports:
            - containerPort: 8080
              name: grpc
          env:
            - name: CROWDSEC_BOUNCER_API_KEY
              value: "envoy-bouncer-static-key"
            - name: CROWDSEC_LAPI_URL
              value: "http://crowdsec-service.crowdsec.svc.cluster.local:8080"
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: crowdsec-envoy-bouncer
  namespace: crowdsec
spec:
  selector:
    app: crowdsec-envoy-bouncer
  ports:
    - name: grpc
      port: 8080
      targetPort: 8080
      protocol: TCP
