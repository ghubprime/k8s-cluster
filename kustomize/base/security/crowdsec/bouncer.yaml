apiVersion: v1
kind: Service
metadata:
  name: crowdsec-bouncer-envoy
  namespace: crowdsec
spec:
  ports:
    - port: 8081
      targetPort: 8081
      name: grpc
  selector:
    app: crowdsec-bouncer-envoy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crowdsec-bouncer-envoy
  namespace: crowdsec
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crowdsec-bouncer-envoy
  template:
    metadata:
      labels:
        app: crowdsec-bouncer-envoy
    spec:
      containers:
        - name: bouncer
          image: docker.io/kdwils/envoy-proxy-crowdsec-bouncer:latest
          env:
            - name: CROWDSEC_BOUNCER_API_KEY
              value: "envoy-bouncer-static-key" # Hardcoded for simplicity, should be SealedSecret in prod
            - name: CROWDSEC_URL
              value: "http://crowdsec-service.crowdsec.svc.cluster.local:8080"
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
