apiVersion: v1
kind: ServiceAccount
metadata:
  name: crowdsec-kubernetes-bouncer
  namespace: crowdsec
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crowdsec-kubernetes-bouncer
rules:
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnetworkpolicies", "ciliumclusterwidenetworkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crowdsec-kubernetes-bouncer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crowdsec-kubernetes-bouncer
subjects:
  - kind: ServiceAccount
    name: crowdsec-kubernetes-bouncer
    namespace: crowdsec
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crowdsec-kubernetes-bouncer
  namespace: crowdsec
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crowdsec-kubernetes-bouncer
  template:
    metadata:
      labels:
        app: crowdsec-kubernetes-bouncer
    spec:
      serviceAccountName: crowdsec-kubernetes-bouncer
      containers:
        - name: bouncer
          image: ghcr.io/hydazz/crowdsec-cilium-bouncer:latest
          env:
            - name: CROWDSEC_BOUNCER_API_KEY
              value: "kubernetes-bouncer-static-key"
            - name: CROWDSEC_URL
              value: "http://crowdsec-service.crowdsec.svc.cluster.local:8080"
            - name: CILIUM_POLICY_NAME
              value: "crowdsec-cilium-bouncer"
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
